<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Study Planner</h1>

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/career">Career Guidance</a>
        <a href="/progress">Progress</a>
        <a href="/motivation">Motivation</a>
        <a href="/logout">Logout</a>
    </nav>
</header>

<div class="container">

    <h2>Add Today's Study Task</h2>

    <form action="/planner" method="POST">

        <input
            type="text"
            name="task"
            placeholder="Enter Study Task"
            required>

        <button type="submit">
            Add Task
        </button>

    </form>

    <br>

    <h2>Your Tasks</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Task</th>
            <th>Status</th>
        </tr>

        {% for task in tasks %}

        <tr>

            <td>{{ task.id }}</td>

            <td>{{ task.task }}</td>

            <td>{{ task.status }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

<footer>

<p>
© 2026 AI-Based Student Career Guidance and Study Motivation System
</p>

</footer>

</body>
</html>
